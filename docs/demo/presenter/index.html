<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><title>AI 工具更新，不只是功能清单 · Presenter</title><style>body{margin:0;background:#0d0d0d;color:#f8f8f8;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif}.wrap{display:grid;grid-template-columns:2fr 1fr;height:100vh;gap:16px;padding:16px}iframe{width:100%;height:100%;border:0;border-radius:16px;background:white}.side{display:grid;grid-template-rows:1fr 1fr 1fr;gap:16px}.panel{background:#1b1b1b;border:1px solid #333;border-radius:16px;padding:18px;overflow:auto}h2{margin:0 0 12px}.note{font-size:22px;line-height:1.45}button{font-size:18px;padding:10px 14px;margin-right:8px;border-radius:10px;border:0}</style></head><body><div class='wrap'><iframe id='current' src='../styles/zara-editorial.html'></iframe><div class='side'><div class='panel'><h2>下一页</h2><iframe id='next' src='../styles/zara-editorial.html?slide=1'></iframe></div><div class='panel'><h2>Speaker Notes</h2><div id='note' class='note'></div></div><div class='panel'><h2>Controls</h2><p id='timer'>00:00</p><button onclick='go(-1)'>上一页</button><button onclick='go(1)'>下一页</button></div></div></div><script>const notes=[{"slide_id": "S01", "title": "AI 工具更新，不只是功能清单", "note": "抓住注意力：观众已经对功能清单疲劳。", "say": "AI 工具每天都在更新，但真正的问题不是功能有没有。"}, {"slide_id": "S02", "title": "如果直接把资料塞进 PPT，模型噪音会进入页面", "note": "制造张力：漂亮页面不等于可讲结构。", "say": "如果直接把资料塞进 PPT，模型噪音会进入页面。"}, {"slide_id": "S03", "title": "Humanize PPT 先用 AST 把资料变成观众路径", "note": "解释方法：Audience、State、Transfer。", "say": "Humanize PPT 先用 AST 把资料变成观众路径。"}, {"slide_id": "S04", "title": "同一份资料可以走中文稳定、风格探索、演讲增强、上线交付", "note": "给出证据：工作流不是模板拼盘。", "say": "同一份资料可以走中文稳定、风格探索、演讲增强、上线交付。"}, {"slide_id": "S05", "title": "先定内容，再定风格；先出 PPT，再加演讲", "note": "收束成可带走原则。", "say": "先定内容，再定风格；先出 PPT，再加演讲。"}];let i=0,t=Date.now();function sync(){document.getElementById('current').src='../styles/zara-editorial.html?slide='+i;document.getElementById('next').src='../styles/zara-editorial.html?slide='+Math.min(i+1,notes.length-1);document.getElementById('note').innerHTML='<b>'+notes[i].slide_id+' '+notes[i].title+'</b><br>'+notes[i].note+'<hr>'+notes[i].say}function go(d){i=Math.max(0,Math.min(notes.length-1,i+d));sync()}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')go(1);if(e.key==='ArrowLeft')go(-1)});setInterval(()=>{let s=Math.floor((Date.now()-t)/1000);document.getElementById('timer').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')},500);sync();</script></body></html>
