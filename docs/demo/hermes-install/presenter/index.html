<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Humanize PPT Demo Roadmap</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f3eb;
      color: #181512;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
      line-height: 1.7;
    }
    main {
      width: min(760px, calc(100vw - 40px));
      padding: 48px 0;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: #7f2a1d;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(36px, 7vw, 72px);
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      margin: 22px 0;
      color: #6b6258;
      font-size: 18px;
    }
    ul {
      margin: 0 0 28px;
      padding-left: 20px;
      color: #6b6258;
    }
    a {
      color: #7f2a1d;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Humanize PPT · Roadmap</p>
    <h1>Demo 暂不开放</h1>
    <p>风格探索、演讲者模式和其他生成模式还没有完成稳定调试，公开入口先隐藏。</p>
    <ul>
      <li>先保留已调好的 Skill 分享 PPT 展示页。</li>
      <li>完成输出链路校验后再恢复多模式在线 Demo。</li>
      <li>补齐讲稿、翻页控制和展示页质量检查。</li>
    </ul>
    <p><a href="https://learnprompt.github.io/humanize-ppt/">返回 Humanize PPT 首页</a></p>
  </main>
</body>
</html>
