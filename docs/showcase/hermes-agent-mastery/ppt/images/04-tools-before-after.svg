  <text x="105" y="792" font-size="30" font-weight="400" fill="#525252" text-anchor="start" style="font-family: Inter, Helvetica Neue, Arial, PingFang SC, Noto Sans SC, sans-serif;">模式差异：聊天框输出语言；Hermes 输出可验收的工作结果。</text>
