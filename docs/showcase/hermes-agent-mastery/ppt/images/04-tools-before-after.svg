  <rect x="1790" y="300" width="220" height="108" fill="#f0f0ee" stroke="#d4d4d2" stroke-width="1"/>
  <text x="1900" y="367" font-size="32" font-weight="500" fill="#0a0a0a" text-anchor="middle" style="font-family: Inter, Helvetica Neue, Arial, PingFang SC, Noto Sans SC, sans-serif;">Skill</text>

  <line x1="1410" y1="354" x2="1490" y2="354" stroke="#002FA7" stroke-width="4"/>
