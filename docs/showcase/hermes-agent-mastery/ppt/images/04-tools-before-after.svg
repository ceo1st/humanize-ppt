  <text x="1260" y="190" font-size="76" font-weight="200" fill="#002FA7" text-anchor="start" style="font-family: Inter, Helvetica Neue, Arial, PingFang SC, Noto Sans SC, sans-serif;">可以执行</text>

  <line x1="1050" y1="110" x2="1050" y2="760" stroke="#d4d4d2" stroke-width="2"/>

