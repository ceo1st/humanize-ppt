  <text x="105" y="94" font-size="26" font-weight="600" fill="#737373" text-anchor="start" style="font-family: Inter, Helvetica Neue, Arial, PingFang SC, Noto Sans SC, sans-serif;letter-spacing:.03em">WITHOUT TOOLS</text>
  <text x="105" y="190" font-size="76" font-weight="200" fill="#0a0a0a" text-anchor="start" style="font-family: Inter, Helvetica Neue, Arial, PingFang SC, Noto Sans SC, sans-serif;">只能建议</text>

